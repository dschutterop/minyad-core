[project]
name = "minyad"
version = "0.1.0"
description = "Home virtual power plant controller for a Dutch household"
requires-python = ">=3.11"
dependencies = [
  "alembic>=1.13",
  "fastapi>=0.111",
  "goodwe>=0.4.8",
  "httpx>=0.27",
  "paho-mqtt>=2.1",
  "prometheus-client>=0.20",
  "psycopg[binary]>=3.2",
  "pydantic-settings>=2.3",
  "python-dateutil>=2.9",
  "requests>=2.32",
  "uvicorn[standard]>=0.30",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.5"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
