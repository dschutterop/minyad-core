services:
  minyad-postgres:
    container_name: minyad-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: minyad
      POSTGRES_PASSWORD: minyad
      POSTGRES_DB: minyad
    volumes:
      - minyad-postgres:/var/lib/postgresql/data
    ports:
      - "${MINYAD_BIND_IP:?Set MINYAD_BIND_IP in .env to the host IP address that should expose Minyad services}:${MINYAD_POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minyad -d minyad"]
      interval: 10s
      timeout: 5s
      retries: 5

  minyad-migrate:
    container_name: minyad-migrate
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://minyad:minyad@minyad-postgres:5432/minyad
    depends_on:
      minyad-postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  minyad-ingest:
    container_name: minyad-ingest
    build: .
    env_file: .env
    environment:
      INGEST_SERVICE: all
      DATABASE_URL: postgresql://minyad:minyad@minyad-postgres:5432/minyad
    depends_on: [minyad-migrate]
    command: python -m minyad.ingest
    restart: unless-stopped

  minyad-control:
    container_name: minyad-control
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://minyad:minyad@minyad-postgres:5432/minyad
    depends_on: [minyad-migrate]
    command: python -m minyad.control
    restart: unless-stopped

  minyad-forecast:
    container_name: minyad-forecast
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://minyad:minyad@minyad-postgres:5432/minyad
    depends_on: [minyad-migrate]
    command: python -m minyad.forecast
    restart: unless-stopped

  minyad-api:
    container_name: minyad-api
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://minyad:minyad@minyad-postgres:5432/minyad
    depends_on: [minyad-migrate]
    command: python -m minyad.api
    ports:
      - "${MINYAD_BIND_IP:?Set MINYAD_BIND_IP in .env to the host IP address that should expose Minyad services}:${MINYAD_API_HOST_PORT:-18000}:8000"
    restart: unless-stopped

  minyad-dashboard:
    container_name: minyad-dashboard
    image: nginx:1.27-alpine
    volumes:
      - ./minyad/dashboard:/usr/share/nginx/html:ro
      - ./minyad/dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [minyad-api]
    ports:
      - "${MINYAD_BIND_IP:?Set MINYAD_BIND_IP in .env to the host IP address that should expose Minyad services}:${MINYAD_DASHBOARD_HOST_PORT:-18080}:80"
    restart: unless-stopped

volumes:
  minyad-postgres:
