services:
  minyad-db:
    image: postgres:16-alpine
    container_name: minyad-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: minyad
      POSTGRES_USER: minyad
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export POSTGRES_PASSWORD="$$(printf '%s' "$$DB_URL" | sed -E 's#^[^:]+://[^:]+:([^@]+)@.*#\1#')"
        exec docker-entrypoint.sh postgres
    volumes:
      - minyad-db-data:/var/lib/postgresql/data
    networks: [minyad-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minyad -d minyad"]
      interval: 5s
      timeout: 5s
      retries: 12

  minyad-migrate:
    build:
      context: .
      dockerfile: migrate/Dockerfile
    container_name: minyad-migrate
    env_file: .env
    depends_on:
      minyad-db:
        condition: service_healthy
    restart: "no"
    networks: [minyad-internal]

  minyad-tls-init:
    image: python:3.12-slim
    container_name: minyad-tls-init
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /run/minyad/tls
        if [ ! -s /run/minyad/tls/internal.crt ] || [ ! -s /run/minyad/tls/internal.key ]; then
          tls_ip_sans="$${MINYAD_TLS_IP_SANS:-}"
          ip_san_lines=""
          ip_san_index=1
          for ip_san in $$(printf '%s' "$$tls_ip_sans" | tr ',' ' '); do
            ip_san_lines="$${ip_san_lines}IP.$${ip_san_index} = $${ip_san}
        "
            ip_san_index=$$((ip_san_index + 1))
          done
          cat > /tmp/minyad-internal-openssl.cnf <<EOF
        [req]
        distinguished_name = req_distinguished_name
        x509_extensions = v3_req
        prompt = no

        [req_distinguished_name]
        CN = minyad-internal

        [v3_req]
        keyUsage = critical, digitalSignature, keyEncipherment
        extendedKeyUsage = serverAuth
        subjectAltName = @alt_names

        [alt_names]
        DNS.1 = minyad-api
        DNS.2 = minyad-strategy
        DNS.3 = minyad-strategy-v3
        DNS.4 = minyad
        DNS.5 = dryad
        DNS.6 = vesper
        DNS.7 = localhost
        DNS.8 = pknpapp001
        DNS.9 = $${MINYAD_HOST_DNS:-minyad-host.example}
        $${ip_san_lines}
        EOF
          openssl req -x509 -newkey rsa:4096 -sha256 -days 36500 -nodes \
            -keyout /run/minyad/tls/internal.key \
            -out /run/minyad/tls/internal.crt \
            -config /tmp/minyad-internal-openssl.cnf
        fi
        chown 1000:1000 /run/minyad/tls/internal.crt /run/minyad/tls/internal.key
        chmod 0644 /run/minyad/tls/internal.crt
        chmod 0640 /run/minyad/tls/internal.key
    volumes:
      - minyad-internal-tls:/run/minyad/tls
    networks: [minyad-internal]

  minyad-mqtt:
    image: eclipse-mosquitto:2
    container_name: minyad-mqtt
    restart: unless-stopped
    env_file: .env
    entrypoint:
      - /bin/sh
      - -ec
      - |
        test -n "$$MQTT_USER" && test -n "$$MQTT_PASS"
        mosquitto_passwd -c -b /tmp/minyad-mosquitto.passwd "$$MQTT_USER" "$$MQTT_PASS"
        chown mosquitto:mosquitto /tmp/minyad-mosquitto.passwd
        chmod 600 /tmp/minyad-mosquitto.passwd
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "${MINYAD_MQTT_BIND_IP:?MINYAD_MQTT_BIND_IP must be set}:1884:1883"
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
    networks: [minyad-internal, minyad-public]
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -u \"$$MQTT_USER\" -P \"$$MQTT_PASS\" -t healthcheck -n"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minyad-mqtt-observer:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: minyad-mqtt-observer
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      METRICS_PORT: 9106
      METRICS_ADDR: 0.0.0.0
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9106:9106"
    depends_on:
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: minyad-ingestion
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      METRICS_PORT: 9102
      METRICS_ADDR: 0.0.0.0
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9102:9102"
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-control:
    build:
      context: .
      dockerfile: control/Dockerfile
    container_name: minyad-control
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      METRICS_PORT: 9103
      METRICS_ADDR: 0.0.0.0
      STRATEGY_V2_PRIMARY: ${STRATEGY_V2_PRIMARY:-false}
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9103:9103"
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-strategy:
    build:
      context: .
      dockerfile: minyad-strategy/Dockerfile
    container_name: minyad-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      DB_URL: ${DB_URL}
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      TZ: Europe/Amsterdam
      STRATEGY_V2_PRIMARY: ${STRATEGY_V2_PRIMARY:-false}
      STRATEGY_VERSION: v2
      MINYAD_TLS_CERT_FILE: /run/minyad/tls/internal.crt
      MINYAD_TLS_KEY_FILE: /run/minyad/tls/internal.key
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-tls-init:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal, minyad-public]
    volumes:
      - minyad-internal-tls:/run/minyad/tls:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import ssl, urllib.request;
          ctx = ssl.create_default_context(cafile='/run/minyad/tls/internal.crt');
          urllib.request.urlopen('https://localhost:8080/health', timeout=2, context=ctx).read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  minyad-strategy-v3:
    build:
      context: .
      dockerfile: minyad-strategy/Dockerfile
    container_name: minyad-strategy-v3
    command: ["python", "-m", "minyad.strategy.v3.service"]
    restart: unless-stopped
    env_file: .env
    environment:
      DB_URL: ${DB_URL}
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      TZ: Europe/Amsterdam
      STRATEGY_VERSION: v3
      SHADOW_MODE: ${STRATEGY3_SHADOW_MODE:-false}
      MQTT_CLIENT_ID: minyad-strategy-v3
      METRICS_PORT: 9104
      METRICS_ADDR: 0.0.0.0
      MINYAD_HEALTH_BIND_ADDR: 0.0.0.0
      MINYAD_TLS_CERT_FILE: /run/minyad/tls/internal.crt
      MINYAD_TLS_KEY_FILE: /run/minyad/tls/internal.key
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9104:9104"
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-tls-init:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal, minyad-public]
    volumes:
      - minyad-internal-tls:/run/minyad/tls:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import ssl, urllib.request;
          ctx = ssl.create_default_context(cafile='/run/minyad/tls/internal.crt');
          urllib.request.urlopen('https://localhost:8080/health', timeout=2, context=ctx).read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  minyad-deadman:
    build:
      context: .
      dockerfile: deadman/Dockerfile
    container_name: minyad-deadman
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: minyad-api
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      MINYAD_TLS_CERT_FILE: /run/minyad/tls/internal.crt
      MINYAD_TLS_KEY_FILE: /run/minyad/tls/internal.key
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --ssl-certfile
      - /run/minyad/tls/internal.crt
      - --ssl-keyfile
      - /run/minyad/tls/internal.key
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-tls-init:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9101:8000"
      - target: 8000
        published: "8002"
    networks: [minyad-internal, minyad-public]
    volumes:
      - minyad-internal-tls:/run/minyad/tls:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import ssl, urllib.request;
          ctx = ssl.create_default_context(cafile='/run/minyad/tls/internal.crt');
          urllib.request.urlopen('https://localhost:8000/health', timeout=2, context=ctx).read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  minyad-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: minyad-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: https://minyad-api:8000
      MINYAD_INTERNAL_CA_FILE: /run/minyad/tls/internal.crt
      MINYAD_CONTAINER_BIND_ADDR: 0.0.0.0
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-api:
        condition: service_healthy
      minyad-mqtt:
        condition: service_healthy
    ports:
      - target: 8080
        published: "8084"
    networks: [minyad-internal, minyad-public]
    volumes:
      - minyad-internal-tls:/run/minyad/tls:ro

  minyad-mobile-frontend:
    build:
      context: .
      dockerfile: mobile-frontend/Dockerfile
    container_name: minyad-mobile-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: https://minyad-api:8000
      MINYAD_INTERNAL_CA_FILE: /run/minyad/tls/internal.crt
      MINYAD_CONTAINER_BIND_ADDR: 0.0.0.0
    depends_on:
      minyad-api:
        condition: service_healthy
    ports:
      - target: 8080
        published: "8085"
    networks: [minyad-internal, minyad-public]
    volumes:
      - minyad-internal-tls:/run/minyad/tls:ro

  minyad-forecast:
    build:
      context: .
      dockerfile: forecast/Dockerfile
    container_name: minyad-forecast
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal, minyad-public]

  minyad-agent:
    build:
      context: .
      dockerfile: minyad-agent/Dockerfile
    container_name: minyad-agent
    restart: unless-stopped
    env_file: .env
    environment:
      MINYAD_API_URL: https://minyad-api:8000
      MINYAD_INTERNAL_CA_FILE: /run/minyad/tls/internal.crt
      DRY_RUN: "true"
      CYCLE_MINUTES: 15
    depends_on:
      minyad-api:
        condition: service_healthy
    networks: [minyad-internal, minyad-public]
    volumes:
      - minyad-internal-tls:/run/minyad/tls:ro

  minyad-trade:
    build:
      context: .
      dockerfile: minyad-trade/Dockerfile
    container_name: minyad-trade
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      METRICS_PORT: 9105
      METRICS_ADDR: 0.0.0.0
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9105:9105"
    depends_on:
      minyad-mqtt:
        condition: service_healthy
      minyad-api:
        condition: service_healthy
    networks: [minyad-internal, minyad-public]

  minyad-reporting:
    build:
      context: .
      dockerfile: reporting/Dockerfile
    container_name: minyad-reporting
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: minyad-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9110:9100"
    networks: [minyad-public]

  minyad-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: minyad-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "${MINYAD_METRICS_BIND_IP:?MINYAD_METRICS_BIND_IP must be set}:9111:8080"
    networks: [minyad-public]

networks:
  minyad-internal:
    internal: true
  minyad-public: {}

volumes:
  minyad-db-data:
  minyad-internal-tls:
