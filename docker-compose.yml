services:
  minyad-db:
    image: postgres:16-alpine
    container_name: minyad-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: minyad
      POSTGRES_USER: minyad
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export POSTGRES_PASSWORD="$$(printf '%s' "$$DB_URL" | sed -E 's#^[^:]+://[^:]+:([^@]+)@.*#\1#')"
        exec docker-entrypoint.sh postgres
    volumes:
      - minyad-db-data:/var/lib/postgresql/data
    networks: [minyad-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minyad -d minyad"]
      interval: 5s
      timeout: 5s
      retries: 12

  minyad-migrate:
    build:
      context: .
      dockerfile: migrate/Dockerfile
    container_name: minyad-migrate
    env_file: .env
    depends_on:
      minyad-db:
        condition: service_healthy
    restart: "no"
    networks: [minyad-internal]

  minyad-mqtt:
    image: eclipse-mosquitto:2
    container_name: minyad-mqtt
    restart: unless-stopped
    env_file: .env
    entrypoint:
      - /bin/sh
      - -ec
      - |
        test -n "$$MQTT_USER" && test -n "$$MQTT_PASS"
        mosquitto_passwd -c -b /tmp/minyad-mosquitto.passwd "$$MQTT_USER" "$$MQTT_PASS"
        chown mosquitto:mosquitto /tmp/minyad-mosquitto.passwd
        chmod 600 /tmp/minyad-mosquitto.passwd
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "127.0.0.1:1884:1883"
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
    networks: [minyad-internal, minyad-public]
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -u \"$$MQTT_USER\" -P \"$$MQTT_PASS\" -t healthcheck -n"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minyad-ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: minyad-ingestion
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-control:
    build:
      context: .
      dockerfile: control/Dockerfile
    container_name: minyad-control
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      STRATEGY_V2_PRIMARY: ${STRATEGY_V2_PRIMARY:-true}
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-strategy:
    build:
      context: .
      dockerfile: minyad-strategy/Dockerfile
    container_name: minyad-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      DB_URL: ${DB_URL}
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
      TZ: Europe/Amsterdam
      STRATEGY_V2_PRIMARY: ${STRATEGY_V2_PRIMARY:-true}
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  minyad-deadman:
    build:
      context: .
      dockerfile: deadman/Dockerfile
    container_name: minyad-deadman
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: minyad-api
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    ports:
      - target: 8000
        published: "8002"
    networks: [minyad-internal, minyad-public]
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  minyad-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: minyad-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://minyad-api:8000
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-api:
        condition: service_healthy
      minyad-mqtt:
        condition: service_healthy
    ports:
      - target: 8080
        published: "8084"
    networks: [minyad-internal, minyad-public]

  minyad-mobile-frontend:
    build:
      context: .
      dockerfile: mobile-frontend/Dockerfile
    container_name: minyad-mobile-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://minyad-api:8000
    depends_on:
      minyad-api:
        condition: service_healthy
    ports:
      - target: 8080
        published: "8085"
    networks: [minyad-internal, minyad-public]

  minyad-forecast:
    build:
      context: .
      dockerfile: forecast/Dockerfile
    container_name: minyad-forecast
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-agent:
    build:
      context: .
      dockerfile: minyad-agent/Dockerfile
    container_name: minyad-agent
    restart: unless-stopped
    env_file: .env
    environment:
      MINYAD_API_URL: http://minyad-api:8000
      DRY_RUN: "true"
      CYCLE_MINUTES: 15
    depends_on:
      minyad-api:
        condition: service_healthy
    networks: [minyad-internal, minyad-public]

  minyad-trade:
    build:
      context: .
      dockerfile: minyad-trade/Dockerfile
    container_name: minyad-trade
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-mqtt:
        condition: service_healthy
      minyad-api:
        condition: service_healthy
    networks: [minyad-internal, minyad-public]

  minyad-reporting:
    build:
      context: .
      dockerfile: reporting/Dockerfile
    container_name: minyad-reporting
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

networks:
  minyad-internal:
    internal: true
  minyad-public: {}

volumes:
  minyad-db-data:
