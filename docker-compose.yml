services:
  minyad-db:
    image: postgres:16-alpine
    container_name: minyad-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: minyad
      POSTGRES_USER: minyad
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export POSTGRES_PASSWORD="$$(printf '%s' "$$DB_URL" | sed -E 's#^[^:]+://[^:]+:([^@]+)@.*#\1#')"
        exec docker-entrypoint.sh postgres
    volumes:
      - minyad-db-data:/var/lib/postgresql/data
    networks: [minyad-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minyad -d minyad"]
      interval: 5s
      timeout: 5s
      retries: 12

  minyad-migrate:
    build:
      context: .
      dockerfile: migrate/Dockerfile
    container_name: minyad-migrate
    env_file: .env
    depends_on:
      minyad-db:
        condition: service_healthy
    restart: "no"
    networks: [minyad-internal]

  minyad-mqtt:
    image: eclipse-mosquitto:2
    container_name: minyad-mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "0.0.0.0:1884:1883"
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
    networks: [minyad-internal, minyad-public]
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "healthcheck", "-n"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minyad-ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: minyad-ingestion
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-control:
    build:
      context: .
      dockerfile: control/Dockerfile
    container_name: minyad-control
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-deadman:
    build:
      context: .
      dockerfile: deadman/Dockerfile
    container_name: minyad-deadman
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: minyad-api
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    ports:
      - target: 8000
        published: "8002"
    networks: [minyad-internal, minyad-public]

  minyad-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: minyad-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://minyad-api:8000
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-api:
        condition: service_started
      minyad-mqtt:
        condition: service_healthy
    ports:
      - target: 8080
        published: "8084"
    networks: [minyad-internal, minyad-public]

  minyad-mobile-frontend:
    build:
      context: .
      dockerfile: mobile-frontend/Dockerfile
    container_name: minyad-mobile-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://minyad-api:8000
    depends_on:
      minyad-api:
        condition: service_started
    ports:
      - target: 8080
        published: "8085"
    networks: [minyad-internal, minyad-public]

  minyad-forecast:
    build:
      context: .
      dockerfile: forecast/Dockerfile
    container_name: minyad-forecast
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

  minyad-agent:
    build:
      context: .
      dockerfile: minyad-agent/Dockerfile
    container_name: minyad-agent
    restart: unless-stopped
    env_file: .env
    environment:
      MINYAD_API_URL: http://minyad-api:8000
      DRY_RUN: "true"
      CYCLE_MINUTES: 15
    depends_on:
      minyad-api:
        condition: service_started
    networks: [minyad-internal, minyad-public]

  minyad-reporting:
    build:
      context: .
      dockerfile: reporting/Dockerfile
    container_name: minyad-reporting
    restart: unless-stopped
    env_file: .env
    environment:
      MQTT_HOST: minyad-mqtt
      MQTT_PORT: 1883
    depends_on:
      minyad-migrate:
        condition: service_completed_successfully
      minyad-mqtt:
        condition: service_healthy
    networks: [minyad-internal]

networks:
  minyad-internal:
    internal: true
  minyad-public: {}

volumes:
  minyad-db-data:
