name: Deploy to self-hosted host
description: >-
  Logs into GHCR and pulls/restarts the production docker-compose stack plus
  host-side systemd services. Shared by deploy.yml and quick-release.yml,
  which previously copy-pasted this job body verbatim.
inputs:
  github-token:
    description: Token used to authenticate to GHCR and to the git remote (composite actions can't read `secrets` directly).
    required: true
  deploy-path:
    description: Host path of the deploy checkout (composite actions can't read `vars` directly).
    required: true
  host-service-units:
    description: Space-separated systemd units to restart.
    required: false
    default: dsmr_bridge.service goodwe_bridge.service enphase_bridge.service enphase_token_refresh.timer
  metrics-bind-ip:
    description: IP to bind the host metrics exporters to.
    required: true
  prometheus-source:
    description: Source label used by the firewalld metrics config script.
    required: true
runs:
  using: composite
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Pull images and restart services
      shell: bash
      env:
        DEPLOY_PATH: ${{ inputs.deploy-path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        HOST_SERVICE_UNITS: ${{ inputs.host-service-units }}
        MINYAD_IMAGE_TAG: ${{ github.sha }}
        MINYAD_METRICS_BIND_IP: ${{ inputs.metrics-bind-ip }}
        MINYAD_PROMETHEUS_SOURCE: ${{ inputs.prometheus-source }}
      run: |
        test -n "${DEPLOY_PATH}"
        git config --global --add safe.directory "${DEPLOY_PATH}"
        cd "${DEPLOY_PATH}"

        # Keep the application checkout current for host-side systemd services.
        git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git -c "url.https://x-access-token:${GITHUB_TOKEN}@github.com/.insteadOf=https://github.com/" fetch --prune origin
        git checkout main
        git merge --ff-only origin/main

        python3.12 -m venv host-services/venv
        host-services/venv/bin/python -m pip install --upgrade pip
        host-services/venv/bin/python -m pip install -r host-services/requirements.txt

        sudo env MINYAD_PROMETHEUS_SOURCE="${MINYAD_PROMETHEUS_SOURCE}" scripts/configure_metrics_firewalld.sh
        sudo env MINYAD_METRICS_BIND_IP="${MINYAD_METRICS_BIND_IP}" scripts/configure_host_metrics_systemd.sh ${HOST_SERVICE_UNITS}

        sudo systemctl daemon-reload
        for unit in ${HOST_SERVICE_UNITS}; do
          if sudo systemctl list-unit-files "${unit}" --no-legend | grep -q "^${unit}"; then
            sudo systemctl restart "${unit}"
          else
            echo "Skipping missing host service unit: ${unit}"
          fi
        done

        MINYAD_IMAGE_TAG="${MINYAD_IMAGE_TAG}" MINYAD_METRICS_BIND_IP="${MINYAD_METRICS_BIND_IP}" docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml pull
        MINYAD_IMAGE_TAG="${MINYAD_IMAGE_TAG}" MINYAD_METRICS_BIND_IP="${MINYAD_METRICS_BIND_IP}" docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d --remove-orphans
        sudo ss -ltnp | grep -E ':(9101|9102|9103|9104|9105|9106|9107|9108|9109|9110|9111)\b'
        sudo firewall-cmd --list-all
        docker image prune -f
