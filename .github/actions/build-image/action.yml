name: Build and push service image
description: >-
  Sets up Buildx, logs into GHCR, and builds+pushes one service's image tagged
  with both the commit SHA and `latest`. Shared by deploy.yml and
  quick-release.yml's per-service build matrix (which must still check out
  the repository itself before calling this).
inputs:
  github-token:
    description: Token used to authenticate to GHCR (composite actions can't read `secrets` directly).
    required: true
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        push: true
        tags: |
          ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
        cache-from: type=gha,scope=${{ matrix.service }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service }}
