name: Build images

on:
  push:
    branches:
      - main

concurrency:
  group: minyad-build-images
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: migrate
            dockerfile: migrate/Dockerfile
          - service: ingestion
            dockerfile: ingestion/Dockerfile
          - service: control
            dockerfile: control/Dockerfile
          - service: strategy
            dockerfile: minyad-strategy/Dockerfile
          - service: deadman
            dockerfile: deadman/Dockerfile
          - service: api
            dockerfile: api/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
          - service: mobile-frontend
            dockerfile: mobile-frontend/Dockerfile
          - service: forecast
            dockerfile: forecast/Dockerfile
          - service: reporting
            dockerfile: reporting/Dockerfile
          - service: monitoring
            dockerfile: monitoring/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build and push image
        uses: ./.github/actions/build-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
