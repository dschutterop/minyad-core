name: Quick release

on:
  workflow_dispatch:

concurrency:
  group: minyad-deploy
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  public-release-gate:
    name: Public release gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run structural public-release blockers
        id: structural
        continue-on-error: true
        run: python3 scripts/public_release_gate.py --require-daniel-approval

      - name: Run gitleaks over full history
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v "${PWD}:/repo" zricethezav/gitleaks:latest detect --source /repo --log-opts="--all" --redact --report-format json --report-path /repo/gitleaks-report.json

      - name: Run trufflehog over full history
        id: trufflehog
        continue-on-error: true
        run: |
          docker run --rm -v "${PWD}:/repo" trufflesecurity/trufflehog:latest git file:///repo --json --no-update --results=verified --fail > trufflehog-report.json

      - name: Upload secret scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-release-secret-scans
          path: |
            gitleaks-report.json
            trufflehog-report.json
          if-no-files-found: ignore

      - name: Enforce public release gate
        run: |
          failed=0
          if [ "${{ steps.structural.outcome }}" != "success" ]; then
            echo "::error::Structural public-release blockers failed."
            failed=1
          fi
          if [ "${{ steps.gitleaks.outcome }}" != "success" ]; then
            echo "::error::gitleaks full-history scan failed."
            failed=1
          fi
          if [ "${{ steps.trufflehog.outcome }}" != "success" ]; then
            echo "::error::trufflehog full-history scan failed."
            failed=1
          fi
          exit "${failed}"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: public-release-gate
    if: github.ref == 'refs/heads/main'
    env:
      MQTT_HOST: ${{ vars.CI_MQTT_HOST || 'localhost' }}
      MQTT_PORT: 1883
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            host-services/requirements.txt

      - name: Configure test secrets
        run: |
          python - <<'PY' >> "${GITHUB_ENV}"
          import base64
          import os
          import secrets

          db_password = secrets.token_urlsafe(24)
          encryption_key = base64.urlsafe_b64encode(os.urandom(32)).decode()
          api_secret = secrets.token_hex(32)
          print(f"DB_URL=postgresql+asyncpg://minyad:{db_password}@localhost:5432/minyad")
          print(f"ENCRYPTION_KEY={encryption_key}")
          print(f"MINYAD_API_SECRET={api_secret}")
          PY

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r host-services/requirements.txt pytest pytest-asyncio

      - name: Validate production compose config
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml config >/dev/null

      - name: Run tests
        run: pytest

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: migrate
            dockerfile: migrate/Dockerfile
          - service: ingestion
            dockerfile: ingestion/Dockerfile
          - service: control
            dockerfile: control/Dockerfile
          - service: strategy
            dockerfile: minyad-strategy/Dockerfile
          - service: deadman
            dockerfile: deadman/Dockerfile
          - service: api
            dockerfile: api/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
          - service: mobile-frontend
            dockerfile: mobile-frontend/Dockerfile
          - service: forecast
            dockerfile: forecast/Dockerfile
          - service: reporting
            dockerfile: reporting/Dockerfile
          - service: monitoring
            dockerfile: monitoring/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy
    runs-on:
      - self-hosted
      - minyad
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      HOME: /home/actions-runner
      HOST_SERVICE_UNITS: dsmr_bridge.service goodwe_bridge.service enphase_bridge.service enphase_token_refresh.timer
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Deploy to self-hosted host
        uses: ./.github/actions/deploy
