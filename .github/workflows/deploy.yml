name: Full release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_trivy:
        description: "Run Trivy image vulnerability scans"
        # README: `required` only controls whether the manual dispatch form must
        # provide a value. It does not make Trivy run. Keep `default: true` and
        # the job conditions below in sync when changing the default behavior.
        required: true
        type: boolean
        default: true

concurrency:
  group: minyad-deploy
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  RUN_TRIVY: ${{ github.event_name == 'push' || inputs.run_trivy == true || inputs.run_trivy == 'true' }}

jobs:
  public-release-gate:
    name: Public release gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run structural public-release blockers
        id: structural
        continue-on-error: true
        run: python3 scripts/public_release_gate.py --require-daniel-approval

      - name: Run gitleaks over full history
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v "${PWD}:/repo" zricethezav/gitleaks:latest detect --source /repo --log-opts="--all" --redact --report-format json --report-path /repo/gitleaks-report.json

      - name: Run trufflehog over full history
        id: trufflehog
        continue-on-error: true
        run: |
          docker run --rm -v "${PWD}:/repo" trufflesecurity/trufflehog:latest git file:///repo --json --no-update --fail > trufflehog-report.json

      - name: Upload secret scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-release-secret-scans
          path: |
            gitleaks-report.json
            trufflehog-report.json
          if-no-files-found: ignore

      - name: Enforce public release gate
        run: |
          failed=0
          if [ "${{ steps.structural.outcome }}" != "success" ]; then
            echo "::error::Structural public-release blockers failed."
            failed=1
          fi
          if [ "${{ steps.gitleaks.outcome }}" != "success" ]; then
            echo "::error::gitleaks full-history scan failed."
            failed=1
          fi
          if [ "${{ steps.trufflehog.outcome }}" != "success" ]; then
            echo "::error::trufflehog full-history scan failed."
            failed=1
          fi
          exit "${failed}"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: public-release-gate
    env:
      PYTHONPATH: ${{ github.workspace }}
      MQTT_HOST: ${{ vars.CI_MQTT_HOST || 'localhost' }}
      MQTT_PORT: 1883
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            minyad-trade/requirements.txt
            host-services/requirements.txt

      - name: Configure test secrets
        run: |
          python - <<'PY' >> "${GITHUB_ENV}"
          import base64
          import os
          import secrets

          db_password = secrets.token_urlsafe(24)
          encryption_key = base64.urlsafe_b64encode(os.urandom(32)).decode()
          api_secret = secrets.token_hex(32)
          print(f"DB_URL=postgresql+asyncpg://minyad:{db_password}@localhost:5432/minyad")
          print(f"ENCRYPTION_KEY={encryption_key}")
          print(f"MINYAD_API_SECRET={api_secret}")
          PY

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r minyad-trade/requirements.txt -r host-services/requirements.txt pytest pytest-asyncio pytest-cov

      - name: Validate production compose config
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/dev/null

      - name: Run tests
        run: pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  sonar:
    name: SonarQube
    runs-on:
      - self-hosted
      - minyad
    needs:
      - test
      - trivy
    if: >-
      ${{
        always()
        && !cancelled()
        && needs.test.result == 'success'
        && (!(github.event_name == 'push' || inputs.run_trivy == true || inputs.run_trivy == 'true') || needs.trivy.result == 'success')
      }}
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Use system Python
        run: |
          python3.12 --version
          echo "PYTHON_BIN=python3.12" >> "${GITHUB_ENV}"

      - name: Install lint dependencies
        run: "${PYTHON_BIN} -m pip install --user --upgrade pip ruff"

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: .

      - name: Download Trivy reports
        if: env.RUN_TRIVY == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-report-*
          path: trivy-reports
          merge-multiple: true

      - name: Convert Trivy reports for SonarQube
        if: env.RUN_TRIVY == 'true'
        run: ${PYTHON_BIN} scripts/trivy_to_sonar.py --ignore-unfixed --output sonar-trivy-issues.json "trivy-reports/*.json"

      - name: Create empty Trivy report for SonarQube
        if: env.RUN_TRIVY != 'true'
        run: |
          printf '{ "issues": [] }\n' > sonar-trivy-issues.json

      - name: Run linters
        run: ${PYTHON_BIN} -m ruff check --preview --select FAST002,RUF029,F841,SIM102 --fix --unsafe-fixes .

      - name: Load SonarQube environment
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          ENV_FILE=""
          if [ -n "${DEPLOY_PATH}" ] && [ -f "${DEPLOY_PATH}/.env" ]; then
            ENV_FILE="${DEPLOY_PATH}/.env"
          elif [ -f ".env" ]; then
            ENV_FILE=".env"
          else
            echo "::error::.env with SONAR_HOST and SONAR_TOKEN not found. Checked workspace .env and DEPLOY_PATH/.env; DEPLOY_PATH='${DEPLOY_PATH}'."
            exit 1
          fi

          set -a
          . "${ENV_FILE}"
          set +a

          if [ -z "${SONAR_HOST}" ] || [ -z "${SONAR_TOKEN}" ]; then
            echo "::error::SONAR_HOST and SONAR_TOKEN must be set in ${ENV_FILE}."
            exit 1
          fi
          echo "::add-mask::${SONAR_TOKEN}"

          case "${SONAR_HOST}" in
            http://*|https://*) SONAR_HOST_URL="${SONAR_HOST}" ;;
            *) SONAR_HOST_URL="http://${SONAR_HOST}" ;;
          esac

          echo "SONAR_HOST_URL=${SONAR_HOST_URL}" >> "${GITHUB_ENV}"
          echo "SONAR_TOKEN=${SONAR_TOKEN}" >> "${GITHUB_ENV}"

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: migrate
            dockerfile: migrate/Dockerfile
          - service: ingestion
            dockerfile: ingestion/Dockerfile
          - service: control
            dockerfile: control/Dockerfile
          - service: strategy
            dockerfile: minyad-strategy/Dockerfile
          - service: deadman
            dockerfile: deadman/Dockerfile
          - service: api
            dockerfile: api/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
          - service: mobile-frontend
            dockerfile: mobile-frontend/Dockerfile
          - service: forecast
            dockerfile: forecast/Dockerfile
          - service: agent
            dockerfile: minyad-agent/Dockerfile
          - service: trade
            dockerfile: minyad-trade/Dockerfile
          - service: reporting
            dockerfile: reporting/Dockerfile
          - service: monitoring
            dockerfile: monitoring/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  trivy:
    name: Trivy ${{ matrix.service }}
    runs-on:
      - self-hosted
      - minyad
    needs: build
    if: ${{ github.event_name == 'push' || inputs.run_trivy == true || inputs.run_trivy == 'true' }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - migrate
          - ingestion
          - control
          - strategy
          - deadman
          - api
          - frontend
          - mobile-frontend
          - forecast
          - agent
          - trade
          - reporting
          - monitoring
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          format: json
          output: trivy-report-${{ matrix.service }}.json
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-report-${{ matrix.service }}.json
          if-no-files-found: error

  trivy-gate:
    name: Trivy gate
    runs-on:
      - self-hosted
      - minyad
    needs: trivy
    if: >-
      ${{
        always()
        && !cancelled()
        && (github.event_name == 'push' || inputs.run_trivy == true || inputs.run_trivy == 'true')
        && needs.trivy.result == 'success'
      }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download Trivy reports
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-report-*
          path: trivy-reports
          merge-multiple: true

      - name: Fail on fixable high or critical vulnerabilities
        run: python3 scripts/trivy_to_sonar.py --ignore-unfixed --output sonar-trivy-issues.json --fail-on-severity HIGH --fail-on-severity CRITICAL "trivy-reports/*.json"

  deploy:
    name: Deploy
    runs-on:
      - self-hosted
      - minyad
    needs:
      - build
      - sonar
      - trivy-gate
    if: >-
      ${{
        github.ref == 'refs/heads/main'
        && always()
        && !cancelled()
        && needs.build.result == 'success'
        && needs.sonar.result == 'success'
        && (!(github.event_name == 'push' || inputs.run_trivy == true || inputs.run_trivy == 'true') || needs.trivy-gate.result == 'success')
      }}
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      HOME: /home/actions-runner
      HOST_SERVICE_UNITS: dsmr_bridge.service goodwe_bridge.service enphase_bridge.service enphase_token_refresh.timer
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images and restart services
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOST_SERVICE_UNITS: ${{ vars.HOST_SERVICE_UNITS || 'dsmr_bridge.service goodwe_bridge.service enphase_bridge.service enphase_token_refresh.timer' }}
          MINYAD_IMAGE_TAG: ${{ github.sha }}
          MINYAD_METRICS_BIND_IP: ${{ vars.MINYAD_METRICS_BIND_IP }}
          MINYAD_PROMETHEUS_SOURCE: ${{ vars.MINYAD_PROMETHEUS_SOURCE }}
        run: |
          test -n "${DEPLOY_PATH}"
          git config --global --add safe.directory "${DEPLOY_PATH}"
          cd "${DEPLOY_PATH}"

          # Keep the application checkout current for host-side systemd services.
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c "url.https://x-access-token:${GITHUB_TOKEN}@github.com/.insteadOf=https://github.com/" fetch --prune origin
          git checkout main
          git merge --ff-only origin/main

          python3.12 -m venv host-services/venv
          host-services/venv/bin/python -m pip install --upgrade pip
          host-services/venv/bin/python -m pip install -r host-services/requirements.txt

          sudo env MINYAD_PROMETHEUS_SOURCE="${MINYAD_PROMETHEUS_SOURCE}" scripts/configure_metrics_firewalld.sh
          sudo env MINYAD_METRICS_BIND_IP="${MINYAD_METRICS_BIND_IP}" scripts/configure_host_metrics_systemd.sh ${HOST_SERVICE_UNITS}

          sudo systemctl daemon-reload
          for unit in ${HOST_SERVICE_UNITS}; do
            if sudo systemctl list-unit-files "${unit}" --no-legend | grep -q "^${unit}"; then
              sudo systemctl restart "${unit}"
            else
              echo "Skipping missing host service unit: ${unit}"
            fi
          done

          MINYAD_IMAGE_TAG="${MINYAD_IMAGE_TAG}" MINYAD_METRICS_BIND_IP="${MINYAD_METRICS_BIND_IP}" docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          MINYAD_IMAGE_TAG="${MINYAD_IMAGE_TAG}" MINYAD_METRICS_BIND_IP="${MINYAD_METRICS_BIND_IP}" docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
          sudo ss -ltnp | grep -E ':(9101|9102|9103|9104|9105|9106|9107|9108|9109|9110|9111)\b'
          sudo firewall-cmd --list-all
          docker image prune -f
