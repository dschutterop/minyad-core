name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: minyad-deploy
  cancel-in-progress: true

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      DB_URL: postgresql+asyncpg://minyad:minyad@127.0.0.1:5432/minyad
      ENCRYPTION_KEY: a1vs6ToK7X31ITVFBzeO40m0KaVMLbstSa2f9IJiMjs=
      MINYAD_API_SECRET: test-secret
      MQTT_HOST: 127.0.0.1
      MQTT_PORT: 1883
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            minyad-trade/requirements.txt
            host-services/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r minyad-trade/requirements.txt -r host-services/requirements.txt pytest pytest-asyncio

      - name: Validate production compose config
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/dev/null

      - name: Run tests
        run: pytest

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: migrate
            dockerfile: migrate/Dockerfile
          - service: ingestion
            dockerfile: ingestion/Dockerfile
          - service: control
            dockerfile: control/Dockerfile
          - service: strategy
            dockerfile: minyad-strategy/Dockerfile
          - service: deadman
            dockerfile: deadman/Dockerfile
          - service: api
            dockerfile: api/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
          - service: mobile-frontend
            dockerfile: mobile-frontend/Dockerfile
          - service: forecast
            dockerfile: forecast/Dockerfile
          - service: agent
            dockerfile: minyad-agent/Dockerfile
          - service: trade
            dockerfile: minyad-trade/Dockerfile
          - service: reporting
            dockerfile: reporting/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy
    runs-on:
      - self-hosted
      - minyad
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      HOME: /home/actions-runner
    steps:
      - name: Pull images and restart services
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ${{ vars.DEPLOY_SSH_KEY_PATH || '/home/actions-runner/.ssh/minyad_deploy' }}
          MINYAD_IMAGE_TAG: ${{ github.sha }}
        run: |
          test -n "${DEPLOY_PATH}"
          test -r "${DEPLOY_SSH_KEY_PATH}"
          mkdir -p "${HOME}/.ssh"
          ssh-keyscan -H github.com >> "${HOME}/.ssh/known_hosts"
          export GIT_SSH_COMMAND="ssh -i ${DEPLOY_SSH_KEY_PATH} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          git config --global --add safe.directory "${DEPLOY_PATH}"
          cd "${DEPLOY_PATH}"
          git fetch --prune origin
          git checkout main
          git pull --ff-only origin main
          MINYAD_IMAGE_TAG="${MINYAD_IMAGE_TAG}" docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          MINYAD_IMAGE_TAG="${MINYAD_IMAGE_TAG}" docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
          docker image prune -f
