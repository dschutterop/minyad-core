sonar.projectKey=Minyad
sonar.projectName=Minyad
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

sonar.sources=.
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.python.coverage.reportPaths=coverage.xml
sonar.externalIssuesReportPaths=sonar-trivy-issues.json

sonar.exclusions=\
  .git/**,\
  .pytest_cache/**,\
  .ruff_cache/**,\
  .venv/**,\
  __pycache__/**,\
  **/__pycache__/**,\
  htmlcov/**,\
  output/**,\
  migrate/alembic/versions/**

sonar.coverage.exclusions=\
  tests/**,\
  migrate/alembic/versions/**,\
  migrate/alembic/env.py,\
  scripts/dump_agent_decisions.py,\
  scripts/fetch_dryad.py,\
  deadman/main.py,\
  reporting/main.py,\
  ingestion/main.py,\
  mobile-frontend/main.py,\
  monitoring/mqtt_observer.py,\
  host-services/minyad_explain.py,\
  host-services/mqtt_browse.py,\
  api/main.py,\
  control/main.py,\
  frontend/main.py,\
  forecast/main.py,\
  host-services/enphase_bridge.py,\
  host-services/goodwe_bridge.py
