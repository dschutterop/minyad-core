groups:
  - name: minyad-general
    rules:
      - alert: MinyadTargetDown
        expr: up{stack="minyad"} == 0
        for: 2m
        labels:
          severity: critical
          stack: minyad
        annotations:
          summary: Minyad Prometheus target is down
          description: A Minyad scrape target has been down for at least 2 minutes.

  - name: minyad-ingestion
    rules:
      - alert: MinyadDsmrIngestionStale
        expr: time() - minyad_ingestion_last_sample_timestamp_seconds{source="dsmr"} > 300
        for: 2m
        labels:
          severity: critical
          stack: minyad
        annotations:
          summary: Minyad DSMR ingestion is stale
          description: DSMR ingestion has not processed a sample for more than 5 minutes.

      - alert: MinyadEnphaseBridgeStale
        expr: time() - minyad_bridge_enphase_last_success_timestamp_seconds > 900
        labels:
          severity: warning
          stack: minyad
        annotations:
          summary: Minyad Enphase bridge is stale
          description: The Enphase bridge has not reported a successful poll for more than 15 minutes.

      - alert: MinyadDsmrBridgeStale
        expr: time() - minyad_bridge_dsmr_last_success_timestamp_seconds > 300
        labels:
          severity: critical
          stack: minyad
        annotations:
          summary: Minyad DSMR bridge is stale
          description: The DSMR bridge has not reported a successful publish for more than 5 minutes.

  - name: minyad-control
    rules:
      - alert: MinyadGoodWeBridgeReadFailures
        expr: increase(minyad_bridge_goodwe_read_failures_total[15m]) > 10
        labels:
          severity: warning
          stack: minyad
        annotations:
          summary: Minyad GoodWe bridge read failures are elevated
          description: The GoodWe bridge has reported more than 10 read failures in 15 minutes.

      - alert: MinyadBatterySocSanity
        expr: minyad_control_battery_soc_ratio < 0.05 or minyad_control_battery_soc_ratio > 0.99
        for: 30m
        labels:
          severity: warning
          stack: minyad
        annotations:
          summary: Minyad battery SoC is near an extreme
          description: Battery SoC has been below 5% or above 99% for 30 minutes.
