scrape_configs:
  - job_name: minyad-api
    scrape_interval: 15s
    honor_labels: false
    scheme: https
    metrics_path: /metrics
    tls_config:
      ca_file: /etc/prometheus/certs/minyad-internal.crt
    static_configs:
      - targets:
          - minyad-host.example:9101
        labels:
          stack: minyad

  - job_name: minyad-ingestion
    scrape_interval: 15s
    honor_labels: false
    static_configs:
      - targets:
          - minyad-host.example:9102
